packages:
  - "packages/*"
  - "apps/*"
# 依存のビルドスクリプトを明示許可（pnpm 11 / CI で ERR_PNPM_IGNORED_BUILDS を回避）
allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  esbuild: true
  prisma: true
  sharp: true
onlyBuiltDependencies:
  - esbuild
  - sharp
  - prisma
  - "@prisma/client"
  - "@prisma/engines"
verifyDepsBeforeRun: false
